<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digit Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #7fff6e;
      --accent2: #6ef2ff;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --danger: #ff6e6e;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -100px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.7s ease both;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(127, 255, 110, 0.08);
      border: 1px solid rgba(127, 255, 110, 0.25);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .badge::before { content: '●'; font-size: 8px; }
    h1 {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      animation: fadeUp 0.7s ease 0.15s both;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius);
      padding: 5px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #0a0a0f;
      font-weight: 700;
    }

    /* Tab Panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Upload Area */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(127, 255, 110, 0.04);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }
    .upload-zone p {
      color: var(--muted);
      font-size: 14px;
    }
    .upload-zone strong { color: var(--text); }

    /* Image Preview */
    #image-preview-wrap {
      display: none;
      margin-top: 20px;
      position: relative;
      text-align: center;
    }
    #image-preview {
      max-height: 220px;
      max-width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      object-fit: contain;
    }
    .remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(255,110,110,0.85);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease;
    }
    .remove-btn:hover { transform: scale(1.1); }

    /* Draw Canvas */
    .canvas-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #draw-canvas {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: crosshair;
      background: #111118;
      touch-action: none;
      transition: border-color 0.2s;
    }
    #draw-canvas:hover { border-color: var(--accent); }
    .canvas-controls {
      display: flex;
      gap: 10px;
    }
    .ctrl-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ctrl-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* URL input */
    .url-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    label.field-label {
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="url"], input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus, input[type="text"]:focus {
      border-color: var(--accent2);
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 1px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(127, 255, 110, 0.3);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.6; }

    /* Result */
    #result-section {
      display: none;
      margin-top: 28px;
      animation: fadeUp 0.5s ease both;
    }
    .result-card {
      border-radius: var(--radius);
      padding: 28px;
      border: 1px solid rgba(127, 255, 110, 0.3);
      background: rgba(127, 255, 110, 0.05);
      text-align: center;
    }
    .result-card.error {
      border-color: rgba(255, 110, 110, 0.3);
      background: rgba(255, 110, 110, 0.05);
    }
    .result-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .result-digit {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -4px;
    }
    .result-card.error .result-digit { font-size: 32px; color: var(--danger); letter-spacing: 0; }
    .result-confidence {
      margin-top: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    .conf-bar-wrap {
      margin-top: 16px;
      height: 6px;
      border-radius: 100px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .conf-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="badge">Neural Network</div>
    <h1>Digit<br/><span>Classifier</span></h1>
    <p class="subtitle">Upload, draw, or link — let the model do the rest.</p>
  </header>

  <div class="card">

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="upload" role="tab">📁 Upload</button>
      <button class="tab-btn" data-tab="draw" role="tab">✏️ Draw</button>
      <button class="tab-btn" data-tab="url" role="tab">🔗 URL</button>
    </div>

    <!-- Upload Panel -->
    <div id="tab-upload" class="tab-panel active">
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <span class="upload-icon">🖼️</span>
        <p><strong>Drop an image here</strong></p>
        <p>or click to browse — PNG, JPG, GIF supported</p>
      </div>
      <div id="image-preview-wrap">
        <img id="image-preview" alt="Preview"/>
        <button class="remove-btn" id="remove-img" title="Remove">✕</button>
      </div>
    </div>

    <!-- Draw Panel -->
    <div id="tab-draw" class="tab-panel">
      <div class="canvas-wrap">
        <canvas id="draw-canvas" width="280" height="280"></canvas>
        <div class="canvas-controls">
          <button class="ctrl-btn" id="clear-canvas">Clear</button>
          <button class="ctrl-btn" id="undo-canvas">Undo</button>
        </div>
      </div>
    </div>

    <!-- URL Panel -->
    <div id="tab-url" class="tab-panel">
      <div class="url-wrap">
        <label class="field-label" for="img-url">Image URL</label>
        <input type="url" id="img-url" placeholder="https://example.com/digit.png" />
      </div>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submit-btn">
      <div class="spinner"></div>
      <span class="btn-text">Classify Digit</span>
    </button>

    <!-- Result -->
    <div id="result-section">
      <div class="result-card" id="result-card">
        <div class="result-label">Predicted Digit</div>
        <div class="result-digit" id="result-digit">—</div>
        <div class="result-confidence" id="result-conf"></div>
        <div class="conf-bar-wrap" id="conf-bar-wrap" style="display:none">
          <div class="conf-bar" id="conf-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

  </div><!-- /card -->

  <footer>
    Powered by your API · Replace API_URL in source with your Render link
  </footer>

</div><!-- /container -->

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const API_URL = "API_URL"; // Replace with your Render link

  // ─── TABS ─────────────────────────────────────────────────
  let activeTab = "upload";
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab-" + activeTab).classList.add("active");
      hideResult();
    });
  });

  // ─── UPLOAD ───────────────────────────────────────────────
  let uploadedFile = null;
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  const previewWrap = document.getElementById("image-preview-wrap");
  const previewImg = document.getElementById("image-preview");

  fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    uploadedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.style.display = "block";
    hideResult();
  }

  document.getElementById("remove-img").addEventListener("click", () => {
    uploadedFile = null;
    fileInput.value = "";
    previewWrap.style.display = "none";
    previewImg.src = "";
    hideResult();
  });

  // ─── DRAW CANVAS ─────────────────────────────────────────
  const canvas = document.getElementById("draw-canvas");
  const ctx = canvas.getContext("2d");
  let drawing = false;
  let snapshots = [];

  ctx.fillStyle = "#111118";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 18;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  canvas.addEventListener("mousedown",  e => { saveSnap(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener("mousemove",  e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
  canvas.addEventListener("mouseup",    () => drawing = false);
  canvas.addEventListener("mouseleave", () => drawing = false);
  canvas.addEventListener("touchstart", e => { e.preventDefault(); saveSnap(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener("touchmove",  e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
  canvas.addEventListener("touchend",   () => drawing = false);

  function saveSnap() { snapshots.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); if (snapshots.length > 30) snapshots.shift(); }

  document.getElementById("clear-canvas").addEventListener("click", () => {
    ctx.fillStyle = "#111118"; ctx.fillRect(0, 0, canvas.width, canvas.height); snapshots = []; hideResult();
  });
  document.getElementById("undo-canvas").addEventListener("click", () => {
    if (snapshots.length) { ctx.putImageData(snapshots.pop(), 0, 0); hideResult(); }
  });

  function canvasToBlob() {
    return new Promise(res => canvas.toBlob(res, "image/png"));
  }

  // ─── SUBMIT ───────────────────────────────────────────────
  const submitBtn = document.getElementById("submit-btn");

  submitBtn.addEventListener("click", async () => {
    const formData = new FormData();
    let hasData = false;

    if (activeTab === "upload") {
      if (!uploadedFile) { shake(submitBtn); return; }
      formData.append("file", uploadedFile);
      hasData = true;
    } else if (activeTab === "draw") {
      const blob = await canvasToBlob();
      // Check canvas is not blank
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const isBlank = !data.some((v, i) => i % 4 !== 3 && v > 20);
      if (isBlank) { shake(submitBtn); return; }
      formData.append("file", blob, "drawn_digit.png");
      hasData = true;
    } else if (activeTab === "url") {
      const url = document.getElementById("img-url").value.trim();
      if (!url) { shake(submitBtn); return; }
      formData.append("url", url);
      hasData = true;
    }

    if (!hasData) return;

    setLoading(true);
    hideResult();

    try {
      const res = await fetch(`${API_URL}/predict`, {
        method: "POST",
        body: formData
      });

      if (!res.ok) throw new Error(`Server responded with ${res.status}`);

      const json = await res.json();
      showResult(json);
    } catch (err) {
      showError(err.message || "Something went wrong. Check the API URL.");
    } finally {
      setLoading(false);
    }
  });

  // ─── RESULT ───────────────────────────────────────────────
  function showResult(data) {
    const section = document.getElementById("result-section");
    const card    = document.getElementById("result-card");
    const digit   = document.getElementById("result-digit");
    const conf    = document.getElementById("result-conf");
    const barWrap = document.getElementById("conf-bar-wrap");
    const bar     = document.getElementById("conf-bar");

    card.classList.remove("error");
    section.style.display = "block";

    // Accept flexible API shapes: {prediction, digit, label, class} + optional confidence
    const pred = data.prediction ?? data.digit ?? data.label ?? data.class ?? data.result ?? "?";
    digit.textContent = pred;

    const confidence = data.confidence ?? data.probability ?? data.score ?? null;
    if (confidence !== null) {
      const pct = Math.round(confidence * (confidence <= 1 ? 100 : 1));
      conf.textContent = `Confidence: ${pct}%`;
      barWrap.style.display = "block";
      setTimeout(() => bar.style.width = pct + "%", 50);
    } else {
      conf.textContent = "";
      barWrap.style.display = "none";
    }
  }

  function showError(msg) {
    const section = document.getElementById("result-section");
    const card    = document.getElementById("result-card");
    const digit   = document.getElementById("result-digit");
    const conf    = document.getElementById("result-conf");
    const barWrap = document.getElementById("conf-bar-wrap");

    section.style.display = "block";
    card.classList.add("error");
    digit.textContent = "Error";
    conf.textContent = msg;
    barWrap.style.display = "none";
  }

  function hideResult() {
    document.getElementById("result-section").style.display = "none";
    document.getElementById("conf-bar").style.width = "0%";
  }

  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.classList.toggle("loading", on);
  }

  function shake(el) {
    el.style.animation = "none";
    el.getBoundingClientRect();
    el.style.animation = "shake 0.4s ease";
    setTimeout(() => el.style.animation = "", 400);
  }

  // Shake keyframe via JS
  const style = document.createElement("style");
  style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }`;
  document.head.appendChild(style);
</script>
</body>
</html>
